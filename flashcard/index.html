<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>스마트 플래시카드</title>
    <style>
        :root { --red: #ff6b6b; --green: #51cf66; --blue: #007bff; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; overflow: hidden; touch-action: none; transition: background-color 0.3s; }
        
        .header { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 1.1rem; color: #555; font-weight: bold; }
        #add-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; }

        #card-container { position: relative; width: 85vw; max-width: 400px; height: 280px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; pointer-events: none; } /* 카드 자체 클릭 방지 */
        .card-inner.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid #ddd; text-align: center; padding: 20px; box-sizing: border-box; background: white; }
        .card-back { transform: rotateY(180deg); color: var(--blue); background-color: #f8fbff; border: 3px solid var(--blue); }
        
        .swipe-label { position: absolute; top: 20px; font-size: 1.5rem; font-weight: bold; padding: 5px 15px; border-radius: 10px; opacity: 0; z-index: 10; pointer-events: none; }
        #label-left { right: 20px; color: var(--red); border: 3px solid var(--red); transform: rotate(15deg); }
        #label-right { left: 20px; color: var(--green); border: 3px solid var(--green); transform: rotate(-15deg); }

        .controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        #view-btn { width: 220px; padding: 18px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 50px; background: var(--blue); color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.3); z-index: 100; cursor: pointer; }
        
        .guide-container { display: flex; justify-content: space-between; width: 85vw; max-width: 400px; opacity: 0; transition: opacity 0.3s; }
        .guide-container.visible { opacity: 1; }

        /* 모달 및 기타 UI 생략 (동일) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; touch-action: auto; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 80%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        textarea { height: 200px; padding: 10px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="status">남은 카드: <span id="count">0</span></div>
        <button id="add-btn">📝 단어 편집</button>
    </div>
    
    <div id="card-container">
        <div id="label-left" class="swipe-label">다시 공부</div>
        <div id="label-right" class="swipe-label">암기 완료</div>
        <div class="card-inner" id="card-inner">
            <div class="card-face card-front" id="front-text">단어</div>
            <div class="card-face card-back" id="back-text">뜻</div>
        </div>
        <div id="touch-surface" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:50; cursor:grab;"></div>
    </div>

    <div class="controls">
        <button id="view-btn">정답 확인하기</button>
        <div class="guide-container" id="guide-container">
            <div style="color:var(--red); font-weight:bold;">⬅️ 헷갈려요</div>
            <div style="color:var(--green); font-weight:bold;">알아요 ➡️</div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3>단어 목록 편집</h3>
            <textarea id="bulk-input" placeholder="단어:뜻 (한 줄에 하나씩)"></textarea>
            <div style="display:flex; gap:10px;">
                <button style="flex:1; padding:10px;" onclick="closeModal()">취소</button>
                <button style="flex:1; padding:10px; background:var(--blue); color:white; border:none; border-radius:5px;" onclick="saveBulkData()">저장</button>
            </div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('myCards')) || [
            { word: "Metaphor", mean: "은유, 비유" },
            { word: "Consistent", mean: "일관된" }
        ];

        const cardInner = document.getElementById('card-inner');
        const viewBtn = document.getElementById('view-btn');
        const guideContainer = document.getElementById('guide-container');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const countDisplay = document.getElementById('count');
        const labelLeft = document.getElementById('label-left');
        const labelRight = document.getElementById('label-right');
        const touchSurface = document.getElementById('touch-surface');

        let isFlipped = false;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        function updateDisplay() {
            localStorage.setItem('myCards', JSON.stringify(cards));
            isFlipped = false; // 상태 리셋
            cardInner.classList.remove('is-flipped'); // 시각적 리셋
            
            if (cards.length > 0) {
                cardInner.style.transition = "transform 0.4s ease, opacity 0.3s";
                cardInner.style.transform = "rotateY(0deg) translateX(0)";
                cardInner.style.opacity = "1";
                
                frontText.innerText = cards[0].word;
                backText.innerText = cards[0].mean;
                
                countDisplay.innerText = cards.length;
                viewBtn.innerText = "정답 확인하기";
                viewBtn.style.visibility = "visible";
                guideContainer.classList.remove('visible');
                document.body.style.backgroundColor = "#f0f2f5";
            } else {
                frontText.innerText = "🎉 완료!";
                backText.innerText = "단어를 추가하세요.";
                countDisplay.innerText = 0;
                viewBtn.style.visibility = "hidden";
            }
        }

        // 버튼 클릭 시 '즉시' 뒤집기
        viewBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // 이벤트 전파 방지
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('is-flipped');
                viewBtn.innerText = "단어 다시보기";
                guideContainer.classList.add('visible');
            } else {
                cardInner.classList.remove('is-flipped');
                viewBtn.innerText = "정답 확인하기";
                guideContainer.classList.remove('visible');
            }
        });

        // 스와이프 감지를 별도의 투명 레이어(touch-surface)에서 처리
        touchSurface.addEventListener('touchstart', (e) => {
            if (!isFlipped) return;
            startX = e.touches[0].clientX;
            isDragging = true;
            cardInner.style.transition = "none";
        });

        touchSurface.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX - startX;
            cardInner.style.transform = `rotateY(180deg) translateX(${currentX}px) rotateZ(${currentX/10}deg)`;

            if (currentX > 50) {
                document.body.style.backgroundColor = "#e6fcf5";
                labelRight.style.opacity = Math.min(currentX/150, 1);
            } else if (currentX < -50) {
                document.body.style.backgroundColor = "#fff5f5";
                labelLeft.style.opacity = Math.min(Math.abs(currentX)/150, 1);
            }
        });

        touchSurface.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            cardInner.style.transition = "transform 0.4s ease, opacity 0.3s";
            labelLeft.style.opacity = 0; labelRight.style.opacity = 0;

            if (Math.abs(currentX) > 120) {
                if (currentX > 0) cards.shift(); // 오른쪽: 삭제
                else cards.push(cards.shift()); // 왼쪽: 유지
                updateDisplay();
            } else {
                cardInner.style.transform = "rotateY(180deg) translateX(0)";
                document.body.style.backgroundColor = "#f0f2f5";
            }
            currentX = 0;
        });

        // 모달 제어 (기존과 동일)
        document.getElementById('add-btn').onclick = () => {
            document.getElementById('bulk-input').value = cards.map(c => `${c.word}:${c.mean}`).join('\n');
            document.getElementById('modal').style.display = 'flex';
        };
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function saveBulkData() {
            const lines = document.getElementById('bulk-input').value.split('\n');
            cards = lines.map(l => {
                const p = l.includes(':') ? l.split(':') : l.split(',');
                return { word: p[0]?.trim(), mean: p[1]?.trim() };
            }).filter(c => c.word && c.mean);
            updateDisplay();
            closeModal();
        }

        updateDisplay();
    </script>
</body>
</html>
